<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おかログ｜本当に行って良かったお店だけ。</title>
<link rel="icon" href="logo.png" type="image/png">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-512.png">
<meta name="theme-color" content="#1F2421">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="おかログ">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{
    --ink:#1F2421; --paper:#FBF7EE; --paper-dim:#F1EBDC;
    --shu:#B23A22; --shu-dark:#8C2C19; --kin:#B8902E; --line:#DDD3BE;
    --wish:#2B5DA6; --wish-dark:#204A87;
  }
  html,body{ background:var(--paper); font-family:"Noto Sans JP",sans-serif; color:var(--ink); }
  .font-display{ font-family:"Shippori Mincho",serif; }
  .store-card{ transition: box-shadow .15s, transform .15s; }
  .store-card:hover{ box-shadow:0 6px 20px rgba(31,36,33,.10); transform:translateY(-1px); }
  .store-card[data-selected="true"]{ outline:2px solid var(--shu); outline-offset:-2px; }
  .wish-card{ border-left:4px solid var(--wish) !important; }
  .btn-primary{ background:var(--shu); color:#fff; }
  .btn-primary:hover{ background:var(--shu-dark); }
  .btn-wish{ background:var(--wish); color:#fff; }
  .btn-wish:hover{ background:var(--wish-dark); }
  .mode-tab{ padding:.5rem 1rem; font-size:.8125rem; font-weight:700; border-bottom:3px solid transparent; color:var(--ink); opacity:.55; }
  .mode-tab[data-active="true"]{ opacity:1; }
  .mode-tab[data-mode="official"][data-active="true"]{ border-color:var(--shu); color:var(--shu); }
  .mode-tab[data-mode="wishlist"][data-active="true"]{ border-color:var(--wish); color:var(--wish); }
  .wl-tab[data-active="true"]{ background:var(--wish); color:#fff; border-color:var(--wish); }
  dialog::backdrop{ background:rgba(31,36,33,.5); }
  dialog{ border:none; border-radius:.75rem; padding:0; }
  ::-webkit-scrollbar{ width:8px; } ::-webkit-scrollbar-thumb{ background:var(--line); border-radius:4px; }
  @media (prefers-reduced-motion: reduce){ .store-card{ transition:none; } }
</style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- アプリ内ブラウザ（LINE等）で開いている場合の警告バナー -->
  <div id="inapp-browser-warning" class="hidden bg-[#F5C518] text-[var(--ink)] text-xs md:text-sm px-4 py-2 flex items-center justify-between gap-3">
    <span>⚠️ このページはアプリ内のブラウザで開かれています。ログイン機能を使うには、右上（または右下）の「…」メニューから<b>「他のアプリで開く」「Safariで開く」「Chromeで開く」</b>を選んで開き直してください。</span>
    <button id="inapp-browser-warning-close" class="shrink-0 font-bold px-2" aria-label="閉じる">✕</button>
  </div>

  <!-- ヘッダー -->
  <header class="bg-[var(--ink)] text-[var(--paper)]">
    <div class="max-w-7xl mx-auto px-4 py-2 flex items-center justify-between gap-3 flex-wrap">
      <div class="flex items-center gap-3">
        <img src="logo.png" alt="おかログ｜本当に行って良かったお店だけ。" class="h-14 md:h-16 w-auto rounded-lg">
        <p class="text-xs md:text-sm text-[var(--paper-dim)] opacity-80">本当に行って良かったお店だけ。。。　関西中心にエリア拡大中。</p>
      </div>
      <div class="flex items-center gap-3 text-xs md:text-sm">
        <a href="guide.html" class="flex items-center gap-1 bg-[var(--kin)]/20 border border-[var(--kin)] text-[var(--paper)] rounded-full px-3 py-1 hover:bg-[var(--kin)]/30 transition-colors">
          <span aria-hidden="true">📖</span> 使い方ガイド
        </a>
        <div id="auth-area" class="flex items-center gap-2"></div>
      </div>
    </div>
  </header>

  <!-- モード切り替えタブ -->
  <nav class="bg-white border-b border-[var(--line)]">
    <div class="max-w-7xl mx-auto px-4 flex gap-1">
      <button id="tab-official" class="mode-tab" data-mode="official" data-active="true">実際に行って良かった店</button>
      <button id="tab-wishlist" class="mode-tab" data-mode="wishlist">行ってみたい店</button>
    </div>
  </nav>

  <!-- 検索・絞り込みバー（「実際に行って良かった店」モード） -->
  <section id="official-controls" class="border-b border-[var(--line)] bg-[var(--paper)] sticky top-0 z-20">
    <div class="max-w-7xl mx-auto px-4 py-3">
      <div class="flex flex-wrap gap-2 items-center">
        <select id="f-pref" class="border border-[var(--line)] rounded-full px-3 py-1.5 text-sm bg-white"></select>
        <select id="f-area" class="border border-[var(--line)] rounded-full px-3 py-1.5 text-sm bg-white"></select>
        <select id="f-genre" class="border border-[var(--line)] rounded-full px-3 py-1.5 text-sm bg-white"></select>
        <select id="f-scene" class="border border-[var(--line)] rounded-full px-3 py-1.5 text-sm bg-white"></select>
        <input id="f-keyword" type="text" placeholder="店名・特徴で検索"
               class="flex-1 min-w-[140px] border border-[var(--line)] rounded-full px-4 py-1.5 text-sm bg-white">
        <button id="btn-clear" class="text-xs text-[var(--ink)]/60 underline underline-offset-2 shrink-0">条件をクリア</button>
        <button id="btn-add-store" class="hidden btn-primary rounded-full px-3 py-1.5 text-sm shrink-0">＋ お店を登録する</button>
      </div>
    </div>
  </section>

  <!-- 登録・絞り込み（「行ってみたい店」モード） -->
  <section id="wishlist-controls" class="hidden border-b border-[var(--line)] bg-[var(--paper)]">
    <div class="max-w-7xl mx-auto px-4 py-3 space-y-3">
      <div id="wishlist-login-required" class="hidden text-sm text-center py-3">
        行ってみたい店の閲覧・登録には、Googleログインが必要です。
        <button id="btn-wishlist-login" class="btn-wish rounded-full px-4 py-1.5 text-sm ml-2">Googleでログイン</button>
      </div>
      <div id="wishlist-form-area" class="space-y-3">
        <div class="bg-white border border-[var(--line)] rounded-xl p-3 space-y-2">
          <p id="wl-form-title" class="font-bold text-xs">＋ 行ってみたいお店を登録する</p>
          <input type="hidden" id="wl-edit-id">
          <input id="wl-name" type="text" placeholder="お店の名前"
                 class="w-full border border-[var(--line)] rounded px-3 py-1.5 text-sm">
          <textarea id="wl-memo" rows="2" placeholder="気になる理由・メモ（任意）"
                 class="w-full border border-[var(--line)] rounded px-3 py-1.5 text-sm"></textarea>
          <input id="wl-address" type="text" placeholder="住所（任意・分かる範囲でOK。地図に表示されます）"
                 class="w-full border border-[var(--line)] rounded px-3 py-1.5 text-sm">
          <input id="wl-url" type="text" placeholder="参考リンク（Instagramの投稿URLなど・任意）"
                 class="w-full border border-[var(--line)] rounded px-3 py-1.5 text-sm">
          <label class="flex items-center gap-2 text-xs text-[var(--ink)]/70">
            <input type="checkbox" id="wl-anonymous">
            匿名で登録する（誰が登録したか他の人には表示されません）
          </label>
          <div class="flex gap-2">
            <button id="btn-add-wish" class="btn-wish rounded-full px-4 py-1.5 text-sm">登録する</button>
            <button id="btn-wl-cancel-edit" class="hidden text-xs px-3 py-1.5 rounded-full border border-[var(--line)]">編集をキャンセル</button>
          </div>
        </div>
        <div class="flex flex-wrap gap-2">
          <div class="flex gap-1.5" id="filter-mine">
            <button data-value="all" class="wl-tab text-xs border border-[var(--line)] rounded-full px-3 py-1 bg-white" data-active="true">すべて</button>
            <button data-value="mine" class="wl-tab text-xs border border-[var(--line)] rounded-full px-3 py-1 bg-white">自分が登録した店</button>
          </div>
          <div class="flex gap-1.5" id="filter-status">
            <button data-value="all" class="wl-tab text-xs border border-[var(--line)] rounded-full px-3 py-1 bg-white" data-active="true">すべて</button>
            <button data-value="unvisited" class="wl-tab text-xs border border-[var(--line)] rounded-full px-3 py-1 bg-white">未訪問</button>
            <button data-value="visited" class="wl-tab text-xs border border-[var(--line)] rounded-full px-3 py-1 bg-white">訪問済み</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- メイン -->
  <main class="flex-1 max-w-7xl w-full mx-auto md:flex md:gap-4 px-4 py-4">
    <section class="md:w-[46%] md:overflow-y-auto md:max-h-[calc(100vh-140px)]">
      <p id="result-count" class="text-xs text-[var(--ink)]/60 mb-2 px-1"></p>
      <div id="list" class="flex flex-col gap-3"></div>
      <div id="empty-state" class="hidden text-center py-16 text-sm text-[var(--ink)]/60"></div>
    </section>
    <section id="map-pane" class="md:w-[54%] mt-4 md:mt-0">
      <div id="map" class="w-full h-[320px] md:h-[calc(100vh-140px)] rounded-xl border border-[var(--line)] bg-[var(--paper-dim)] sticky top-[132px]"></div>
    </section>
  </main>

  <!-- お店 追加/編集 モーダル（実際に行って良かった店） -->
  <dialog id="store-dialog" class="w-[92vw] max-w-lg">
    <form method="dialog" id="store-form" class="p-4 space-y-2 max-h-[85vh] overflow-y-auto">
      <h2 id="store-dialog-title" class="font-bold text-lg mb-2">実際に行って良かった店を登録</h2>
      <input type="hidden" id="sf-id">
      <label class="block text-xs font-bold">店名<input required id="sf-name" class="w-full border border-[var(--line)] rounded px-2 py-1 text-sm"></label>
      <label class="block text-xs font-bold">ジャンル
        <select id="sf-genre" class="w-full border border-[var(--line)] rounded px-2 py-1 text-sm"></select>
      </label>
      <div class="grid grid-cols-2 gap-2">
        <label class="block text-xs font-bold">都道府県<input required id="sf-pref" class="w-full border border-[var(--line)] rounded px-2 py-1 text-sm"></label>
        <label class="block text-xs font-bold">市区町村<input required id="sf-city" class="w-full border border-[var(--line)] rounded px-2 py-1 text-sm"></label>
      </div>
      <label class="block text-xs font-bold">エリア（例：梅田・北新地・中之島）<input required id="sf-area" class="w-full border border-[var(--line)] rounded px-2 py-1 text-sm"></label>
      <label class="block text-xs font-bold">住所（地図ピンに使われます）<input required id="sf-address" class="w-full border border-[var(--line)] rounded px-2 py-1 text-sm"></label>
      <label class="block text-xs font-bold">満足度（1〜5）
        <select id="sf-taste" class="w-full border border-[var(--line)] rounded px-2 py-1 text-sm">
          <option value="0">未評価</option><option value="1">1</option><option value="2">2</option>
          <option value="3">3</option><option value="4">4</option><option value="5">5</option>
        </select>
      </label>
      <div id="sf-scenes" class="flex flex-wrap gap-1.5"></div>
      <label class="block text-xs font-bold">おすすめポイント（オーナー・編集者のコメント）<textarea id="sf-features" class="w-full border border-[var(--line)] rounded px-2 py-1 text-sm" rows="2"></textarea></label>
      <label class="block text-xs font-bold">外部URL（予約サイト等）<input id="sf-url" class="w-full border border-[var(--line)] rounded px-2 py-1 text-sm"></label>
      <p id="sf-status" class="text-xs text-[var(--shu)]"></p>
      <div class="flex justify-end gap-2 pt-2">
        <button type="button" id="sf-cancel" class="text-sm px-3 py-1.5 rounded-full border border-[var(--line)]">キャンセル</button>
        <button type="submit" id="sf-submit" class="text-sm px-4 py-1.5 rounded-full btn-primary">保存する</button>
      </div>
    </form>
  </dialog>

  <!-- お店の登録タイプ選択ダイアログ -->
  <dialog id="type-dialog" class="w-[92vw] max-w-sm">
    <div class="p-4 space-y-3">
      <h2 class="font-bold text-base">どちらで登録しますか？</h2>
      <button id="type-wishlist" class="w-full text-left border border-[var(--line)] rounded-lg p-3 hover:bg-[var(--paper-dim)]">
        <span class="font-bold text-sm">行ってみたい店</span>
        <p class="text-xs text-[var(--ink)]/60 mt-1">まだ行ったことがないけれど気になっているお店。誰でも登録できます。あとで実際に行った人が感想を書き込めます。</p>
      </button>
      <button id="type-official" class="w-full text-left border border-[var(--line)] rounded-lg p-3 hover:bg-[var(--paper-dim)]">
        <span class="font-bold text-sm">実際に行って良かった店</span>
        <p class="text-xs text-[var(--ink)]/60 mt-1">実際に行って、本当に良かったお店。検索・地図に正式に載ります（編集者・オーナーのみ登録できます）。</p>
      </button>
      <button type="button" id="type-cancel" class="text-sm px-3 py-1.5 rounded-full border border-[var(--line)] w-full">キャンセル</button>
    </div>
  </dialog>

  <script type="module">
    import { db, auth, googleProvider } from "./firebase-init.js";
    import {
      collection, getDocs, getDoc, setDoc, addDoc, updateDoc, deleteDoc, doc,
      query, where, orderBy, limit
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { GENRES, SCENES, AREA_TREE } from "./constants.js";
    import {
      GOOGLE_MAPS_API_KEY, EMAILJS_PUBLIC_KEY, EMAILJS_SERVICE_ID,
      EMAILJS_TEMPLATE_ID, EMAILJS_WISHLIST_TEMPLATE_ID
    } from "./firebase-init.js";
    import emailjs from "https://esm.run/@emailjs/browser";
    emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });

    // ---------------------------------------------------------------
    // アプリ内ブラウザ（LINE・Instagram・Facebook等）の検知
    // Googleがこれらの環境からのログインをブロックするため、先に案内する
    // ---------------------------------------------------------------
    (function checkInAppBrowser(){
      const ua = navigator.userAgent || "";
      const isInApp = /Line\/|FBAN|FBAV|Instagram|Twitter|MicroMessenger/i.test(ua);
      if(isInApp){
        const banner = document.getElementById("inapp-browser-warning");
        banner.classList.remove("hidden");
        document.getElementById("inapp-browser-warning-close").addEventListener("click", ()=>{
          banner.classList.add("hidden");
        });
      }
    })();

    // ---------------------------------------------------------------
    // 認証・権限（role）
    // ---------------------------------------------------------------
    let currentUser = null;     // Firebase Authのユーザー情報
    let currentRole = "anonymous"; // 'anonymous' | 'member' | 'editor' | 'owner'
    let currentNickname = "";

    async function ensureUserDoc(user){
      const ref = doc(db, "users", user.uid);
      const snap = await getDoc(ref).catch(()=>null);
      if(!snap || !snap.exists()){
        await setDoc(ref, {
          email: user.email, displayName: user.displayName || "名無しさん",
          role: "member", createdAt: new Date().toISOString(),
        });
      }
      const fresh = await getDoc(ref);
      return fresh.data();
    }

    async function changeNickname(){
      const next = prompt("表示名（口コミ・行ってみたい店リストに表示される名前）を入力してください", currentNickname || "");
      if(!next) return;
      await updateDoc(doc(db, "users", currentUser.uid), { displayName: next });
      currentNickname = next;
      renderAuthArea();
    }

    function roleLabel(role){
      return { owner:"オーナー", editor:"編集者", member:"ログイン中" }[role] || "";
    }

    function renderAuthArea(){
      const box = document.getElementById("auth-area");
      const btnAdd = document.getElementById("btn-add-store");
      if(currentUser){
        box.innerHTML = `
          <span class="opacity-80">${currentNickname}さん（${roleLabel(currentRole)}）</span>
          <button id="btn-nickname" class="underline underline-offset-2">表示名を変更</button>
          <button id="btn-logout" class="underline underline-offset-2">ログアウト</button>`;
        document.getElementById("btn-nickname").addEventListener("click", changeNickname);
        document.getElementById("btn-logout").addEventListener("click", ()=> signOut(auth));
        btnAdd.classList.remove("hidden"); // ログインしていれば誰でも登録の入口を見せる（種類はダイアログで選ぶ）
      }else{
        box.innerHTML = `<button id="btn-login" class="underline underline-offset-2">Googleでログイン</button>`;
        document.getElementById("btn-login").addEventListener("click", ()=> signInWithRedirect(auth, googleProvider));
        btnAdd.classList.add("hidden");
      }
      renderWishlistAuthState();
    }

    // リダイレクト方式のログイン結果を確認（失敗時はエラー内容を表示）
    getRedirectResult(auth).catch((err)=>{
      console.error("ログインに失敗しました", err);
      if(err.code === "auth/unauthorized-domain"){
        alert("このサイトのドメインがFirebaseの許可リストに登録されていません。管理者に連絡してください。");
      }else if(err.code !== "auth/no-current-user" && err.code){
        alert(`ログインに失敗しました（${err.code}）。\nアプリ内ブラウザ（LINE・Instagram等）で開いている場合は、右上のメニューから「ブラウザで開く」を選んでもう一度お試しください。`);
      }
    });

    onAuthStateChanged(auth, async (user)=>{
      currentUser = user;
      if(user){
        const data = await ensureUserDoc(user);
        currentRole = data.role || "member";
        currentNickname = data.displayName || user.displayName || "名無しさん";
      }else{
        currentRole = "anonymous"; currentNickname = "";
      }
      renderAuthArea();
      if(viewMode === "official") applyFilters();
      else if(currentUser) loadWishlist();
    });

    // ---------------------------------------------------------------
    // モード切り替え（実際に行って良かった店 ／ 行ってみたい店）
    // ---------------------------------------------------------------
    let viewMode = "official";
    function switchMode(mode){
      viewMode = mode;
      document.querySelectorAll(".mode-tab").forEach(t=> t.dataset.active = (t.dataset.mode === mode));
      document.getElementById("official-controls").classList.toggle("hidden", mode !== "official");
      document.getElementById("wishlist-controls").classList.toggle("hidden", mode !== "wishlist");
      if(mode === "official"){
        applyFilters();
      }else{
        renderWishlistAuthState();
        if(currentUser) loadWishlist();
      }
    }
    document.getElementById("tab-official").addEventListener("click", ()=> switchMode("official"));
    document.getElementById("tab-wishlist").addEventListener("click", ()=> switchMode("wishlist"));

    function renderWishlistAuthState(){
      const loginBox = document.getElementById("wishlist-login-required");
      const formArea = document.getElementById("wishlist-form-area");
      if(viewMode !== "wishlist") return;
      if(currentUser){
        loginBox.classList.add("hidden");
        formArea.classList.remove("hidden");
      }else{
        loginBox.classList.remove("hidden");
        formArea.classList.add("hidden");
        document.getElementById("list").innerHTML = "";
        document.getElementById("result-count").textContent = "";
        document.getElementById("empty-state").classList.add("hidden");
      }
    }
    document.getElementById("btn-wishlist-login").addEventListener("click", ()=> signInWithRedirect(auth, googleProvider));

    // 「?mode=wishlist」でアクセスされた場合（旧wishlist.htmlのリンク・メール通知リンクからの遷移用）は自動でタブを切替
    if(new URLSearchParams(window.location.search).get("mode") === "wishlist"){
      switchMode("wishlist");
      window.history.replaceState({}, "", window.location.pathname);
    }

    // ---------------------------------------------------------------
    // 検索・絞り込み状態（実際に行って良かった店：すべてプルダウンの単一選択。変更したら即反映）
    // ---------------------------------------------------------------
    const state = { pref:"", area:"", genre:"", scene:"", keyword:"" };
    let allStores = []; let markers = {}; let map, infoWindow, geocoder;

    const STORAGE_KEY = "okalog_search_state_v2";
    function saveState(){
      sessionStorage.setItem(STORAGE_KEY, JSON.stringify({ ...state, scrollY:window.scrollY }));
    }
    function restoreState(){
      const raw = sessionStorage.getItem(STORAGE_KEY); if(!raw) return;
      try{
        const s = JSON.parse(raw);
        state.pref=s.pref||""; state.area=s.area||""; state.genre=s.genre||""; state.scene=s.scene||"";
        state.keyword=s.keyword||"";
        requestAnimationFrame(()=> window.scrollTo(0, s.scrollY||0));
      }catch(e){}
    }
    window.addEventListener("pagehide", saveState);

    function fillPrefSelect(){
      const sel = document.getElementById("f-pref");
      sel.innerHTML = `<option value="">都道府県（すべて）</option>` +
        Object.keys(AREA_TREE).map(p=>`<option value="${p}">${p}</option>`).join("");
      sel.value = state.pref;
    }
    function fillAreaSelect(){
      const sel = document.getElementById("f-area");
      if(!state.pref){
        sel.innerHTML = `<option value="">エリア（都道府県を選択）</option>`;
        sel.disabled = true; sel.value = "";
        return;
      }
      const areas = [...new Set(Object.values(AREA_TREE[state.pref]).flat())];
      sel.innerHTML = `<option value="">エリア（すべて）</option>` + areas.map(a=>`<option value="${a}">${a}</option>`).join("");
      sel.disabled = false; sel.value = state.area;
    }
    function fillGenreSelect(){
      const sel = document.getElementById("f-genre");
      sel.innerHTML = `<option value="">ジャンル（すべて）</option>` + GENRES.map(g=>`<option value="${g}">${g}</option>`).join("");
      sel.value = state.genre;
    }
    function fillSceneSelect(){
      const sel = document.getElementById("f-scene");
      sel.innerHTML = `<option value="">利用シーン（すべて）</option>` + SCENES.map(s=>`<option value="${s}">${s}</option>`).join("");
      sel.value = state.scene;
    }
    function renderFilterBar(){
      fillPrefSelect(); fillAreaSelect(); fillGenreSelect(); fillSceneSelect();
      document.getElementById("f-keyword").value = state.keyword;
    }
    document.getElementById("f-pref").addEventListener("change", e=>{
      state.pref = e.target.value; state.area = "";
      fillAreaSelect(); applyFilters();
    });
    document.getElementById("f-area").addEventListener("change", e=>{ state.area = e.target.value; applyFilters(); });
    document.getElementById("f-genre").addEventListener("change", e=>{ state.genre = e.target.value; applyFilters(); });
    document.getElementById("f-scene").addEventListener("change", e=>{ state.scene = e.target.value; applyFilters(); });
    document.getElementById("f-keyword").addEventListener("input", e=>{ state.keyword = e.target.value; applyFilters(); });
    document.getElementById("btn-clear").addEventListener("click", ()=>{
      state.pref=""; state.area=""; state.genre=""; state.scene=""; state.keyword="";
      renderFilterBar(); applyFilters();
    });

    function applyFilters(){
      const kw = state.keyword.trim().toLowerCase();
      const filtered = allStores.filter(s=>{
        if(state.pref && s.prefecture !== state.pref) return false;
        if(state.area && s.area !== state.area) return false;
        if(state.genre && s.genre !== state.genre) return false;
        if(state.scene && !(s.scenes||[]).includes(state.scene)) return false;
        if(kw && !(`${s.name} ${s.features||""}`).toLowerCase().includes(kw)) return false;
        return true;
      });
      document.getElementById("empty-state").innerHTML =
        "条件に合うお店が見つかりませんでした。<br>絞り込み条件を減らして、もう一度お試しください。";
      renderList(filtered); renderMarkers(filtered, "official");
    }

    // ---------------------------------------------------------------
    // 一覧描画（実際に行って良かった店：口コミ・編集/削除ボタン含む）
    // ---------------------------------------------------------------
    function starString(n){ return "★".repeat(n) + "☆".repeat(5-n); }

    function renderList(items){
      if(viewMode !== "official") return;
      const list = document.getElementById("list"); const empty = document.getElementById("empty-state");
      document.getElementById("result-count").textContent = `${items.length}件のお店`;
      list.innerHTML = ""; empty.classList.toggle("hidden", items.length>0);
      const canEdit = currentRole === "owner" || currentRole === "editor";
      const isOwner = currentRole === "owner";

      items.forEach((s, i)=>{
        const isRequester = currentUser && s.deleteRequestedBy === currentUser.uid;
        let deleteBadge = "";
        if(s.deleteRequested && isOwner){
          deleteBadge = ' <span class="text-[10px] text-white bg-[var(--shu)] rounded-full px-2 py-0.5 align-middle">削除依頼あり</span>';

        const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(mapQuery)}`;
        const card = document.createElement("article");
        card.className = "store-card bg-white border border-[var(--line)] rounded-xl p-3";
        card.dataset.id = s.id;
        card.innerHTML = `
          <div class="flex items-start gap-3 cursor-pointer" data-role="focus">
            <div class="flex-1 min-w-0">
              <h3 class="font-bold text-base truncate">${s.name}${deleteBadge}</h3>
              <p class="text-xs text-[var(--ink)]/60">${s.area} ／ ${s.genre}</p>
              <p class="text-[var(--kin)] text-sm">${starString(s.taste||0)}</p>
              <div class="flex flex-wrap gap-1 mt-1">${(s.scenes||[]).map(sc=>`<span class="text-[10px] bg-[var(--paper-dim)] text-[var(--ink)]/70 rounded-full px-2 py-0.5">${sc}</span>`).join("")}</div>
            </div>
          </div>
          ${s.features ? `<p class="text-xs mt-2 bg-[var(--paper-dim)] rounded p-2"><span class="font-bold">おすすめポイント：</span>${s.features}</p>` : ""}
          <p class="text-xs text-[var(--ink)]/60 mt-2">${s.address || ""}</p>
          <div class="flex flex-wrap gap-3 mt-1 text-xs">
            <a href="${mapUrl}" target="_blank" rel="noopener" class="underline underline-offset-2 text-[var(--shu)]" onclick="event.stopPropagation()">Googleマップで見る</a>
            ${s.url ? `<a href="${s.url}" target="_blank" rel="noopener" class="underline underline-offset-2 text-[var(--shu)]" onclick="event.stopPropagation()">お店のサイト・予約はこちら</a>` : ""}
          </div>
          <div class="flex flex-wrap gap-2 mt-2 text-xs">
            <button data-role="toggle-review" class="underline underline-offset-2 text-[var(--ink)]/70">口コミを見る・書く</button>
            ${canEdit ? `<button data-role="edit" class="underline underline-offset-2 text-[var(--ink)]/70">編集</button>` : ""}
            ${canEdit && !isOwner && !s.deleteRequested ? `<button data-role="request-delete" class="underline underline-offset-2 text-[var(--shu)]">削除依頼</button>` : ""}
            ${isOwner ? `<button data-role="delete" class="underline underline-offset-2 text-[var(--shu)]">削除</button>` : ""}
            ${isOwner && s.deleteRequested ? `<button data-role="reject-delete" class="underline underline-offset-2 text-[var(--ink)]/60">依頼を却下</button>` : ""}
          </div>
          <div data-role="review-box" class="hidden mt-2 pt-2 border-t border-[var(--line)] space-y-2"></div>
        `;
        card.querySelector('[data-role="focus"]').addEventListener("click", ()=> focusStore(s));
        card.querySelector('[data-role="toggle-review"]').addEventListener("click", ()=> toggleReviewBox(card, s));
        if(canEdit) card.querySelector('[data-role="edit"]').addEventListener("click", ()=> openStoreModal(s));
        if(canEdit && !isOwner) card.querySelector('[data-role="request-delete"]')?.addEventListener("click", ()=> requestDelete(s));
        if(isOwner) card.querySelector('[data-role="delete"]')?.addEventListener("click", ()=> deleteStore(s));
        if(isOwner) card.querySelector('[data-role="reject-delete"]')?.addEventListener("click", ()=> rejectDeleteRequest(s));
        list.appendChild(card);
      });
    }

    async function toggleReviewBox(card, store){
      const box = card.querySelector('[data-role="review-box"]');
      const willOpen = box.classList.contains("hidden");
      box.classList.toggle("hidden");
      if(willOpen && !box.dataset.loaded){
        box.dataset.loaded = "1";
        box.innerHTML = `<p class="text-xs text-[var(--ink)]/50">読み込み中…</p>`;
        const snap = await getDocs(query(collection(db,"reviews"), where("restaurantId","==",store.id)));
        const reviews = snap.docs.map(d=>d.data()).sort((a,b)=> (b.createdAt||"").localeCompare(a.createdAt||""));
        box.innerHTML = "";
        if(reviews.length === 0){
          box.innerHTML = `<p class="text-xs text-[var(--ink)]/50">まだ口コミがありません。</p>`;
        }else{
          reviews.forEach(r=>{
            const p = document.createElement("p");
            p.className = "text-xs";
            p.innerHTML = `<span class="font-bold">${r.nickname||"名無しさん"}</span>：${r.text}`;
            box.appendChild(p);
          });
        }
        const formWrap = document.createElement("div");
        if(currentUser){
          formWrap.className = "flex gap-2 pt-1";
          formWrap.innerHTML = `
            <input type="text" placeholder="口コミを書く（テキストのみ）" class="flex-1 border border-[var(--line)] rounded px-2 py-1 text-xs" data-role="review-input">
            <button class="btn-primary text-xs rounded-full px-3" data-role="review-submit">投稿</button>`;
          box.appendChild(formWrap);
          formWrap.querySelector('[data-role="review-submit"]').addEventListener("click", async ()=>{
            const input = formWrap.querySelector('[data-role="review-input"]');
            const text = input.value.trim();
            if(!text) return;
            await addDoc(collection(db,"reviews"), {
              restaurantId: store.id, authorUid: currentUser.uid, nickname: currentNickname,
              text, createdAt: new Date().toISOString(),
            });
            input.value = ""; box.dataset.loaded = ""; toggleReviewBox(card, store); toggleReviewBox(card, store);
          });
        }else{
          formWrap.className = "text-xs text-[var(--ink)]/50";
          formWrap.textContent = "口コミを書くにはログインが必要です。";
          box.appendChild(formWrap);
        }
      }
    }

    async function requestDelete(store){
      if(!confirm(`「${store.name}」の削除をオーナーに依頼します。よろしいですか？`)) return;
      await updateDoc(doc(db,"restaurants",store.id), {
        deleteRequested: true,
        deleteRequestedBy: currentUser.uid,
        deleteRequestedAt: new Date().toISOString(),
      });
      try{
        await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
          store_name: store.name,
          requester_name: currentNickname,
          request_date: new Date().toLocaleString("ja-JP"),
        });
      }catch(e){
        console.error("削除依頼メールの送信に失敗しました", e);
      }
      await loadStoresAndRefresh();
    }
    async function rejectDeleteRequest(store){
      if(!confirm(`「${store.name}」の削除依頼を却下します（お店は削除されません）。よろしいですか？`)) return;
      await updateDoc(doc(db,"restaurants",store.id), {
        deleteRequested: false, deleteRequestedBy: null, deleteRequestedAt: null,
      });
      await loadStoresAndRefresh();
    }
    async function deleteStore(store){
      if(!confirm(`「${store.name}」を完全に削除します。元に戻せません。よろしいですか？`)) return;
      await deleteDoc(doc(db,"restaurants",store.id));
      await loadStoresAndRefresh();
    }

    // ---------------------------------------------------------------
    // お店 追加・編集モーダル（実際に行って良かった店）
    // ---------------------------------------------------------------
    const dialog = document.getElementById("store-dialog");
    function fillStaticFormOptions(){
      document.getElementById("sf-genre").innerHTML = GENRES.map(g=>`<option value="${g}">${g}</option>`).join("");
      const sceneBox = document.getElementById("sf-scenes");
      sceneBox.innerHTML = SCENES.map(sc=>`<label class="text-xs border border-[var(--line)] rounded-full px-2 py-1 bg-white"><input type="checkbox" value="${sc}" class="mr-1">${sc}</label>`).join("");
    }
    function openStoreModal(store, prefill){
      document.getElementById("store-dialog-title").textContent = store ? "お店を編集" : "実際に行って良かった店を登録";
      document.getElementById("sf-id").value = store?.id || "";
      document.getElementById("sf-name").value = store?.name || prefill?.name || "";
      document.getElementById("sf-genre").value = store?.genre || GENRES[0];
      document.getElementById("sf-pref").value = store?.prefecture || "";
      document.getElementById("sf-city").value = store?.city || "";
      document.getElementById("sf-area").value = store?.area || "";
      document.getElementById("sf-address").value = store?.address || prefill?.address || "";
      document.getElementById("sf-taste").value = String(store?.taste || 0);
      document.getElementById("sf-features").value = store?.features || prefill?.memo || "";
      document.getElementById("sf-url").value = store?.url || prefill?.url || "";
      document.getElementById("sf-status").textContent = prefill
        ? "行ってみたい店リストから登録しています。ジャンル・エリア・住所など残りの項目を確認・入力してください。"
        : "";
      const selectedScenes = new Set(store?.scenes || []);
      document.querySelectorAll('#sf-scenes input[type=checkbox]').forEach(cb=> cb.checked = selectedScenes.has(cb.value));
      switchMode("official");
      dialog.showModal();

    const typeDialog = document.getElementById("type-dialog");
    document.getElementById("btn-add-store").addEventListener("click", ()=> typeDialog.showModal());
    document.getElementById("type-cancel").addEventListener("click", ()=> typeDialog.close());
    document.getElementById("type-wishlist").addEventListener("click", ()=>{
      typeDialog.close();
      switchMode("wishlist");
      document.getElementById("wl-name")?.focus();
    });
    document.getElementById("type-official").addEventListener("click", ()=>{
      typeDialog.close();
      if(currentRole === "owner" || currentRole === "editor"){
        openStoreModal(null);
      }else{
        alert("「実際に行って良かった店」の正式登録は、編集者・オーナーのみ行えます。\nまずは「行ってみたい店」として登録し、確認をお待ちください。");
      }
    });
    document.getElementById("sf-cancel").addEventListener("click", ()=> dialog.close());

    async function nextCurationNo(){
      const snap = await getDocs(query(collection(db,"restaurants"), orderBy("curationNo","desc"), limit(1)));
      if(snap.empty) return 1;
      return (snap.docs[0].data().curationNo || 0) + 1;
    }

    function geocodeAddress(address){
      return new Promise(resolve=>{
        if(!geocoder || !address){ resolve(null); return; }
        geocoder.geocode({address}, (results,status)=>{
          if(status==="OK" && results[0]){ const l=results[0].geometry.location; resolve({lat:l.lat(), lng:l.lng()}); }
          else resolve(null);
        });
      });
    }

    document.getElementById("store-form").addEventListener("submit", async (e)=>{
      e.preventDefault();
      const statusEl = document.getElementById("sf-status");
      statusEl.textContent = "地図の位置を確認しています…";
      const id = document.getElementById("sf-id").value;
      const address = document.getElementById("sf-address").value.trim();
      const scenes = [...document.querySelectorAll('#sf-scenes input[type=checkbox]:checked')].map(cb=>cb.value);
      const geo = await geocodeAddress(address);
      const data = {
        name: document.getElementById("sf-name").value.trim(),
        genre: document.getElementById("sf-genre").value,
        prefecture: document.getElementById("sf-pref").value.trim(),
        city: document.getElementById("sf-city").value.trim(),
        area: document.getElementById("sf-area").value.trim(),
        address, scenes,
        taste: Number(document.getElementById("sf-taste").value) || 0,
        features: document.getElementById("sf-features").value.trim(),
        url: document.getElementById("sf-url").value.trim(),
        lat: geo ? geo.lat : null, lng: geo ? geo.lng : null,
        updatedAt: new Date().toISOString(),
      };
      if(!geo) statusEl.textContent = "※住所から地図位置を特定できませんでした（保存はされます）";
      if(id){
        await updateDoc(doc(db,"restaurants",id), data);
      }else{
        data.deleteRequested = false;
        data.curationNo = await nextCurationNo();
        await addDoc(collection(db,"restaurants"), data);
      }
      dialog.close();
      await loadStoresAndRefresh();
    });

    // ---------------------------------------------------------------
    // 行ってみたい店
    // ---------------------------------------------------------------
    let allWishItems = [];
    const wlFilter = { mine: "all", status: "all" };

    function setupTabGroup(containerId, key, cb){
      const box = document.getElementById(containerId);
      box.querySelectorAll(".wl-tab").forEach(btn=>{
        btn.addEventListener("click", ()=>{
          box.querySelectorAll(".wl-tab").forEach(b=> b.dataset.active = "false");
          btn.dataset.active = "true";
          wlFilter[key] = btn.dataset.value;
          cb();
        });
      });
    }
    setupTabGroup("filter-mine", "mine", ()=> applyWishlistFilter());
    setupTabGroup("filter-status", "status", ()=> applyWishlistFilter());

    function resetWishlistForm(){
      document.getElementById("wl-edit-id").value = "";
      document.getElementById("wl-name").value = "";
      document.getElementById("wl-memo").value = "";
      document.getElementById("wl-address").value = "";
      document.getElementById("wl-url").value = "";
      document.getElementById("wl-anonymous").checked = false;
      document.getElementById("wl-form-title").textContent = "＋ 行ってみたいお店を登録する";
      document.getElementById("btn-add-wish").textContent = "登録する";
      document.getElementById("btn-wl-cancel-edit").classList.add("hidden");
    }
    function startEditWishItem(item){
      document.getElementById("wl-edit-id").value = item.id;
      document.getElementById("wl-name").value = item.name || "";
      document.getElementById("wl-memo").value = item.memo || "";
      document.getElementById("wl-address").value = item.address || "";
      document.getElementById("wl-url").value = item.referenceUrl || "";
      document.getElementById("wl-anonymous").checked = !!item.anonymous;
      document.getElementById("wl-form-title").textContent = "「" + item.name + "」を編集する";
      document.getElementById("btn-add-wish").textContent = "更新する";
      document.getElementById("btn-wl-cancel-edit").classList.remove("hidden");
      document.getElementById("wishlist-form-area").scrollIntoView({behavior:"smooth", block:"start"});
      document.getElementById("wl-name").focus();
    }
    document.getElementById("btn-wl-cancel-edit").addEventListener("click", resetWishlistForm);

    document.getElementById("btn-add-wish").addEventListener("click", async ()=>{
      const name = document.getElementById("wl-name").value.trim();
      if(!name){ alert("お店の名前を入力してください"); return; }
      const editId = document.getElementById("wl-edit-id").value;
      const memo = document.getElementById("wl-memo").value.trim();
      const address = document.getElementById("wl-address").value.trim();
      const referenceUrl = document.getElementById("wl-url").value.trim();
      const anonymous = document.getElementById("wl-anonymous").checked;
      const btn = document.getElementById("btn-add-wish");
      btn.disabled = true;
      try{
        const geo = await geocodeAddress(address);
        if(editId){
          await updateDoc(doc(db,"wishlist",editId), {
            name, memo, referenceUrl, address,
            lat: geo ? geo.lat : null, lng: geo ? geo.lng : null,
            anonymous,
          });
        }else{
          await addDoc(collection(db,"wishlist"), {
            name, memo, referenceUrl, address,
            lat: geo ? geo.lat : null, lng: geo ? geo.lng : null,
            addedBy: currentUser.uid,
            addedByNickname: currentNickname,
            anonymous,
            status: "unvisited",
            impression: "", impressionByNickname: "",
            createdAt: new Date().toISOString(),
          });
        }
        resetWishlistForm();
        loadWishlist();
      }catch(err){
        console.error(err);
        alert(`保存に失敗しました。\n\nエラー内容：${err.code || err.message}\n\nFirestoreのルールが最新版になっているか確認してください。`);
      }finally{
        btn.disabled = false;
      }
    });

    async function loadWishlist(){
      try{
        const snap = await getDocs(query(collection(db,"wishlist"), orderBy("createdAt","desc")));
        allWishItems = snap.docs.map(d=>({id:d.id, ...d.data()}));
        applyWishlistFilter();
      }catch(e){
        console.error(e);
        document.getElementById("list").innerHTML =
          `<p class="text-xs text-[var(--shu)]">一覧の読み込みに失敗しました（${e.code || e.message}）。Firestoreのルールが最新版になっているか確認してください。</p>`;
      }
    }

    function applyWishlistFilter(){
      if(viewMode !== "wishlist") return;
      const filtered = allWishItems.filter(item=>{
        if(wlFilter.mine === "mine" && !(currentUser && item.addedBy === currentUser.uid)) return false;
        if(wlFilter.status !== "all" && item.status !== wlFilter.status) return false;
        return true;
      });
      document.getElementById("empty-state").textContent = "条件に合う登録がありません。";
      renderWishlistList(filtered);
      renderMarkers(filtered, "wishlist");
    }

    function renderWishlistList(items){
      const list = document.getElementById("list"); const empty = document.getElementById("empty-state");
      document.getElementById("result-count").textContent = `${items.length}件`;

        const requesterLabel = item.anonymous ? "（匿名）" : `${item.addedByNickname || "名無しさん"} さんが登録`;
        const canManage = isMine || currentRole === "owner"; // 編集・削除は「登録した人」と「オーナー」のみ
        const visited = item.status === "visited";
        const mapQuery = (item.lat && item.lng) ? `${item.lat},${item.lng}` : (item.address || item.name);

        card.innerHTML = `
          <div class="flex items-start justify-between gap-2">
            <div class="min-w-0">

                ${item.lat && item.lng ? `<a href="${mapUrl}" target="_blank" rel="noopener" class="text-xs text-[var(--wish)] underline underline-offset-2">Googleマップで見る</a>` : ""}

              </div>
              <p class="text-[10px] text-[var(--ink)]/40 mt-1">${requesterLabel}${isMine && item.anonymous ? "（自分の登録です）" : ""}</p>
            </div>
            <div class="flex flex-col items-end gap-1 shrink-0">

          ${visited ? `
            <div class="mt-2 pt-2 border-t border-[var(--line)] text-xs space-y-2">

            <div class="mt-2 pt-2 border-t border-[var(--line)] space-y-2">
              <div class="flex gap-2" data-role="impression-form">

                <button class="btn-wish text-xs rounded-full px-3" data-role="impression-submit">投稿</button>
              </div>
              ${(currentRole === "owner" || currentRole === "editor") ? `
                <button data-role="promote" class="btn-primary rounded-full px-3 py-1 text-xs">実際に行って良かった店として登録する</button>
              ` : ""}
            </div>
          `}
        `;
        if(canManage){
          card.querySelector('[data-role="edit-wish"]').addEventListener("click", ()=> startEditWishItem(item));
          card.querySelector('[data-role="delete"]').addEventListener("click", async ()=>{
            if(!confirm(`「${item.name}」をリストから削除します。よろしいですか？`)) return;
            await deleteDoc(doc(db,"wishlist",item.id));
            loadWishlist();
          });

        if(!visited){
          card.querySelector('[data-role="impression-submit"]').addEventListener("click", async ()=>{
            const input = card.querySelector('[data-role="impression-input"]');
            const text = input.value.trim();
            if(!text) return;
            await updateDoc(doc(db,"wishlist",item.id), {
              status: "visited", impression: text, impressionByNickname: currentNickname,
            });
            notifyWishlistRegistrant(item, text);
            loadWishlist();
          });
        }
        if(item.lat && item.lng){
          card.addEventListener("click", (e)=>{
            if(e.target.closest("a,button,input")) return;
            focusWishItem(item);
          });
        }
        if(currentRole === "owner" || currentRole === "editor"){
          card.querySelector('[data-role="promote"]')?.addEventListener("click", ()=>{
            const memo = [item.memo, visited ? `【${item.impressionByNickname || "名無しさん"}さんの感想】${item.impression}` : ""]
              .filter(Boolean).join("\n");
            openStoreModal(null, { name: item.name, memo, url: item.referenceUrl || "", address: item.address || "" });
          });
        }
        list.appendChild(card);
      });
    }

    async function notifyWishlistRegistrant(item, impressionText){
      if(!item.addedBy || item.addedBy === currentUser.uid) return;
      try{
        const userSnap = await getDoc(doc(db,"users",item.addedBy));
        if(!userSnap.exists()) return;
        const toEmail = userSnap.data().email;
        if(!toEmail) return;
        await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_WISHLIST_TEMPLATE_ID, {
          to_email: toEmail, store_name: item.name,
          commenter_name: currentNickname, impression_text: impressionText,
        });
      }catch(e){
        console.error("行ってみたい店リストの通知メール送信に失敗しました", e);
      }
    }

    function focusWishItem(item){
      if(item.lat && item.lng && map){
        map.panTo({lat:item.lat, lng:item.lng}); map.setZoom(16);
        const marker = markers[item.id];
        if(marker){ infoWindow.setContent(`<strong>${item.name}</strong>（行ってみたい店）`); infoWindow.open(map, marker); }
      }
      if(window.innerWidth < 768) document.getElementById("map-pane").scrollIntoView({behavior:"smooth", block:"start"});
    }

    // ---------------------------------------------------------------
    // 地図・データ読み込み（共通）
    // ---------------------------------------------------------------
    function focusStore(s){
      document.querySelectorAll(".store-card").forEach(el=> el.dataset.selected = (el.dataset.id===s.id));
      if(s.lat && s.lng && map){
        map.panTo({lat:s.lat, lng:s.lng}); map.setZoom(16);
        const marker = markers[s.id];
        if(marker){ infoWindow.setContent(`<strong>${s.name}</strong><br>${s.area}／${s.genre}`); infoWindow.open(map, marker); }
      }
      if(window.innerWidth < 768) document.getElementById("map-pane").scrollIntoView({behavior:"smooth", block:"start"});
      saveState();
    }
    window.initMap = function(){
      map = new google.maps.Map(document.getElementById("map"), { center:{lat:34.6937,lng:135.5023}, zoom:11, mapId:"OKALOG_MAP" });
      infoWindow = new google.maps.InfoWindow();
      geocoder = new google.maps.Geocoder();
      loadStoresAndRefresh(true);
    };
    // type: "official"（赤・標準ピン）または "wishlist"（青ピン）で色分け
    function renderMarkers(items, type){
      Object.values(markers).forEach(m=> m.setMap(null)); markers = {};
      items.forEach(s=>{
        if(!s.lat || !s.lng) return;
        const opts = { position:{lat:s.lat,lng:s.lng}, map, title:s.name };
        if(type === "wishlist"){
          opts.icon = "https://maps.google.com/mapfiles/ms/icons/blue-dot.png";
        }
        const marker = new google.maps.Marker(opts);
        marker.addListener("click", ()=> type === "wishlist" ? focusWishItem(s) : focusStore(s));
        markers[s.id] = marker;
      });
    }
    async function loadStoresAndRefresh(first){
      const snap = await getDocs(collection(db,"restaurants"));
      allStores = snap.docs.map(d=>({id:d.id, ...d.data()}));
      if(first){ restoreState(); renderFilterBar(); }
      if(viewMode === "official") applyFilters();
    }

    fillStaticFormOptions();
    const mapScript = document.createElement("script");
    mapScript.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_API_KEY}&callback=initMap`;
    mapScript.async = true;
    document.head.appendChild(mapScript);
  </script>
</body>
</html>
