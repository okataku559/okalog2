<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おかログ｜データ取込・書き出しツール（オーナー専用）</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  body{ font-family:sans-serif; background:#F7F3EA; }
  .log-ok{ color:#2E7D32; } .log-err{ color:#B23A22; }
</style>
</head>
<body class="min-h-screen p-6">
<div class="max-w-2xl mx-auto space-y-6">

  <div>
    <h1 class="text-xl font-bold">おかログ データ取込・書き出しツール</h1>
    <p class="text-sm text-gray-600 mt-1">
      オーナー専用のページです。公開サイトからはリンクされていません。
    </p>
  </div>

  <div id="auth-box" class="bg-white border rounded-lg p-4">
    <p id="auth-status" class="text-sm mb-2">まだログインしていません。</p>
    <button id="btn-login" class="bg-[#1F2421] text-white text-sm rounded-full px-4 py-2">Googleでログイン</button>
    <button id="btn-logout" class="hidden text-sm underline text-gray-500 ml-3">ログアウト</button>
  </div>

  <div id="no-permission" class="hidden bg-white border rounded-lg p-4 text-sm text-[#B23A22]">
    このアカウントには「オーナー」権限がありません。取込・書き出しツールは使えません。
  </div>

  <div id="import-box" class="hidden bg-white border rounded-lg p-4 space-y-3">
    <div>
      <label class="text-sm font-bold block mb-1">① CSVファイルを選択して取り込む</label>
      <input type="file" id="csv-file" accept=".csv" class="text-sm">
      <p class="text-xs text-gray-500 mt-1">列の順番：name, genre, prefecture, city, area, address, taste, scenes, features, url（scenesは「;」区切り）</p>
    </div>
    <button id="btn-import" class="bg-[#B23A22] text-white text-sm rounded-full px-4 py-2 disabled:opacity-40" disabled>② Firestoreに取り込む</button>
    <label class="flex items-start gap-2 text-xs text-[#B23A22] bg-[#FBEDE9] border border-[#B23A22]/30 rounded p-2">
      <input type="checkbox" id="wipe-before-import" class="mt-0.5">
      <span>既存のお店データを全て削除してから取り込む（データを最新のリストで丸ごと入れ替えたいとき用。口コミは削除されません。元に戻せません）</span>
    </label>
    <div id="log" class="text-xs font-mono bg-gray-50 border rounded p-3 h-64 overflow-y-auto whitespace-pre-wrap"></div>
  </div>

  <div id="export-box" class="hidden bg-white border rounded-lg p-4 space-y-2">
    <label class="text-sm font-bold block">現在のデータをCSVで書き出す</label>
    <button id="btn-export" class="bg-[#1F2421] text-white text-sm rounded-full px-4 py-2">今のデータをダウンロード</button>
  </div>

</div>

<script type="module">
  import { auth, db, googleProvider, GOOGLE_MAPS_API_KEY } from "./firebase-init.js";
  import { signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    collection, getDocs, getDoc, setDoc, deleteDoc, doc, query, orderBy, limit
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const authStatus = document.getElementById("auth-status");
  const btnLogin = document.getElementById("btn-login");
  const btnLogout = document.getElementById("btn-logout");
  const importBox = document.getElementById("import-box");
  const exportBox = document.getElementById("export-box");
  const noPermission = document.getElementById("no-permission");
  const btnImport = document.getElementById("btn-import");
  const csvFile = document.getElementById("csv-file");
  const logBox = document.getElementById("log");

  function log(msg, type=""){
    const line = document.createElement("div");
    if(type) line.className = `log-${type}`;
    line.textContent = msg;
    logBox.appendChild(line);
    logBox.scrollTop = logBox.scrollHeight;
  }

  btnLogin.addEventListener("click", ()=> signInWithPopup(auth, googleProvider));
  btnLogout.addEventListener("click", ()=> signOut(auth));

  onAuthStateChanged(auth, async (user)=>{
    importBox.classList.add("hidden"); exportBox.classList.add("hidden"); noPermission.classList.add("hidden");
    if(user){
      authStatus.textContent = `ログイン中：${user.email}`;
      btnLogin.classList.add("hidden"); btnLogout.classList.remove("hidden");

      const ref = doc(db, "users", user.uid);
      let snap = await getDoc(ref).catch(()=>null);
      if(!snap || !snap.exists()){
        await setDoc(ref, { email:user.email, displayName:user.displayName||"名無しさん", role:"member", createdAt:new Date().toISOString() });
        snap = await getDoc(ref);
      }
      const role = snap.data().role;
      if(role === "owner"){
        importBox.classList.remove("hidden");
        exportBox.classList.remove("hidden");
      }else{
        noPermission.classList.remove("hidden");
      }
    }else{
      authStatus.textContent = "まだログインしていません。";
      btnLogin.classList.remove("hidden"); btnLogout.classList.add("hidden");
    }
  });

  csvFile.addEventListener("change", ()=> btnImport.disabled = !csvFile.files.length);

  let geocoder;
  const mapScript = document.createElement("script");
  mapScript.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_API_KEY}&callback=onMapsReady`;
  window.onMapsReady = ()=>{ geocoder = new google.maps.Geocoder(); };
  document.head.appendChild(mapScript);

  function geocodeAddress(address){
    return new Promise((resolve)=>{
      if(!geocoder){ resolve(null); return; }
      geocoder.geocode({ address }, (results, status)=>{
        if(status === "OK" && results[0]){
          const loc = results[0].geometry.location;
          resolve({ lat: loc.lat(), lng: loc.lng() });
        }else resolve(null);
      });
    });
  }

  async function nextCurationNo(){
    const snap = await getDocs(query(collection(db,"restaurants"), orderBy("curationNo","desc"), limit(1)));
    if(snap.empty) return 1;
    return (snap.docs[0].data().curationNo || 0) + 1;
  }

  async function wipeAllRestaurants(){
    const snap = await getDocs(collection(db,"restaurants"));
    log(`既存データ ${snap.docs.length}件を削除しています…`);
    for(const d of snap.docs){
      await deleteDoc(doc(db,"restaurants",d.id));
    }
    log("既存データの削除が完了しました。");
  }

  btnImport.addEventListener("click", async ()=>{
    const file = csvFile.files[0];
    if(!file) return;
    const wipe = document.getElementById("wipe-before-import").checked;
    if(wipe){
      const ok = confirm("既存のお店データを全て削除してから取り込みます。元に戻せません。本当によろしいですか？");
      if(!ok) return;
    }
    btnImport.disabled = true;
    logBox.innerHTML = "";
    if(wipe){ await wipeAllRestaurants(); }
    Papa.parse(file, {
      header: true, skipEmptyLines: true,
      complete: async (results)=>{
        let curationNo = wipe ? 1 : await nextCurationNo();
        log(`${results.data.length}件を読み込みました。取込を開始します…`);
        for(const row of results.data){
          const name = (row.name||"").trim();
          if(!name){ log("スキップ：店名が空の行があります", "err"); continue; }
          try{
            const geo = await geocodeAddress(row.address || "");
            if(!geo) log(`⚠ ${name}：住所から地図位置を特定できませんでした（後で手動修正してください）`, "err");
            const data = {
              name, genre:(row.genre||"").trim(), prefecture:(row.prefecture||"").trim(),
              city:(row.city||"").trim(), area:(row.area||"").trim(), address:(row.address||"").trim(),
              taste: Number(row.taste) || 0,
              scenes: (row.scenes||"").split(";").map(s=>s.trim()).filter(Boolean),
              features:(row.features||"").trim(), url:(row.url||"").trim(),
              lat: geo?geo.lat:null, lng: geo?geo.lng:null,
              deleteRequested:false, curationNo:curationNo++, updatedAt:new Date().toISOString(),
            };
            const ref = doc(collection(db, "restaurants"));
            await setDoc(ref, data);
            log(`✔ ${name} を登録しました（No.${data.curationNo}）`, "ok");
          }catch(e){ log(`✘ ${name}：登録に失敗しました（${e.message}）`, "err"); }
        }
        log("すべて完了しました。トップページで反映を確認してください。");
        btnImport.disabled = false;
      }
    });
  });

  document.getElementById("btn-export").addEventListener("click", async ()=>{
    const snap = await getDocs(collection(db,"restaurants"));
    const rows = snap.docs.map(d=>{
      const s = d.data();
      return {
        name:s.name||"", genre:s.genre||"", prefecture:s.prefecture||"", city:s.city||"",
        area:s.area||"", address:s.address||"", taste:s.taste||0,
        scenes:(s.scenes||[]).join(";"), features:s.features||"", url:s.url||"",
      };
    });
    const csv = Papa.unparse(rows);
    const blob = new Blob(["\uFEFF"+csv], {type:"text/csv;charset=utf-8;"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `okalog_export_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  });
</script>
</body>
</html>
